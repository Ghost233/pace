# PACE 基础配置（所有环境共享）
executor: claude-code

agents:
  max_concurrent: 3
  model_profile: balanced

tracker:
  type: local
  github:
    repo: ""
    username: ""
    verified: false
    create_missing_issue: false
    sync_stage_comments: false

git:
  name: ""
  email: ""

roles:
  enabled: false
  definitions_path: "roles"
  managers:
    dispatch: PACE-调度经理
    issue_intake: PACE-需求接管经理
    phase: PACE-阶段经理
    delivery: PACE-交付经理
    closeout: PACE-验收归档经理
